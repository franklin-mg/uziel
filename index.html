<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameUziel - Multijuegos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#673AB7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rubik:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-main: #1a1a2e;
            --text-light: #ffffff;
            --accent-cyan: #00bcd4;
            --accent-pink: #e91e63;
            --accent-green: #4caf50;
            --accent-yellow: #ffc107;
            --accent-amber: #ff9800;
            --accent-purple: #9c27b0;
            --font-bold: 'Archivo Black', sans-serif;
            --font-ui: 'Rubik', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: var(--font-ui);
            background-color: var(--bg-main);
            overflow: hidden;
            color: var(--text-light);
        }

        header {
            height: 60px;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 4px solid var(--accent-cyan);
        }

        .header-left { font-family: var(--font-bold); color: var(--accent-cyan); text-transform: uppercase; }

        #game-area {
            flex: 1;
            position: relative;
            background: #16213e;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-screen {
            position: absolute;
            inset: 0;
            background: var(--bg-main);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 12px;
            text-align: center;
        }

        .menu-title { font-family: var(--font-bold); font-size: 2.2rem; color: var(--accent-cyan); margin-bottom: 10px; }

        .mode-btn {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-family: var(--font-bold);
            font-size: 1rem;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .mode-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        /* UI COMÚN */
        .game-ui-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 1500;
            pointer-events: none;
        }

        .ui-tag {
            pointer-events: auto;
            padding: 8px 15px;
            border-radius: 12px;
            font-family: var(--font-bold);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #score-tag { background: var(--accent-cyan); color: #000; }
        #timer-tag { background: #ff5252; color: white; }

        /* RETO DE LETRAS - CARTAS GRANDES */
        #memory-grid {
            display: none;
            gap: 15px;
            padding: 20px;
            perspective: 1000px;
            justify-content: center;
            align-content: center;
            width: 100%;
            height: 100%;
        }

        .letter-card {
            width: 110px;
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .letter-card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-bold);
            font-size: 4rem;
            border: 5px solid var(--accent-cyan);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        .card-front { background: #0f3460; color: transparent; }
        .card-back { background: var(--accent-purple); color: white; transform: rotateY(180deg); }

        /* FRUTAS */
        #fruits-table {
            display: none; position: absolute; top: 80px; bottom: 20px;
            width: 95%; max-width: 800px; background: radial-gradient(circle, #1e2a4a 0%, #0f172a 100%);
            border-radius: 20px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
        }

        .fruit-card {
            position: absolute; width: 85px; height: 85px; background: white;
            border-radius: 15px; border: 3px solid #ccc; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.2s, opacity 0.5s; font-size: 2.5rem;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.5);
        }

        /* LABERINTO */
        #maze-container {
            display: none; position: relative; width: 95vw; height: 95vw; max-width: 500px; max-height: 500px;
            background: #000; border: 4px solid var(--accent-amber); overflow: hidden;
        }
        .maze-wall { position: absolute; background: #1a1a2e; }
        #maze-player { 
            position: absolute; width: 20px; height: 20px; background: var(--accent-yellow); 
            border-radius: 50%; box-shadow: 0 0 15px var(--accent-yellow); z-index: 100;
        }
        #maze-goal {
            position: absolute; width: 20px; height: 20px; background: var(--accent-green);
            z-index: 90; display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .maze-controls {
            display: none; position: absolute; bottom: 10px; width: 100%;
            justify-content: center; gap: 10px; padding: 10px;
        }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; font-size: 1.5rem; }

        /* LLUVIA */
        #falling-area { display: none; position: absolute; inset: 0; overflow: hidden; }
        #falling-container { position: absolute; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; height: 100%; }
        #falling-targets {
            display: none; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 95%; max-width: 600px;
            background: rgba(15, 52, 96, 0.95); padding: 15px; border-radius: 25px;
            justify-content: space-around; border: 3px solid var(--accent-cyan);
            z-index: 1000;
        }

        footer { height: 40px; background: #0f3460; color: #536dfe; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div class="header-left">GAMEUZIEL</div>
    <div class="header-right" id="current-mode-label" style="font-family: var(--font-bold); color: var(--accent-amber)">MENU</div>
</header>

<div id="game-area">
    <div id="menu-overlay" class="overlay-screen">
        <h1 class="menu-title">GAMEUZIEL</h1>
        <button class="mode-btn" style="background: var(--accent-purple)" onclick="showDifficulty('letters')">RETO DE LETRAS</button>
        <button class="mode-btn" style="background: var(--accent-cyan); color: #000;" onclick="startGame('falling')">LLUVIA DE FIGURAS</button>
        <button class="mode-btn" style="background: var(--accent-pink)" onclick="startGame('fruits')">FIESTA DE FRUTAS</button>
        <button class="mode-btn" style="background: var(--accent-amber); color: #000;" onclick="startGame('maze')">EL LABERINTO</button>
    </div>

    <div id="diff-overlay" class="overlay-screen" style="display:none">
        <h2 class="menu-title" style="font-size:1.5rem">¿CUÁNTAS CARTAS?</h2>
        <button class="mode-btn" style="background: #4caf50" onclick="startGame(state.mode, 4)">4 CARTAS</button>
        <button class="mode-btn" style="background: #ff9800" onclick="startGame(state.mode, 6)">6 CARTAS</button>
        <button class="mode-btn" style="background: #f44336" onclick="startGame(state.mode, 8)">8 CARTAS</button>
        <button class="mode-btn" style="background: #333" onclick="backToMenu()">VOLVER</button>
    </div>

    <div class="game-ui-overlay" id="game-ui" style="display:none">
        <button class="ui-tag" style="background: #16213e; color: #fff; border: 1px solid #fff; pointer-events: auto;" onclick="backToMenu()">VOLVER</button>
        <div id="timer-tag" class="ui-tag">00:00</div>
        <div id="score-tag" class="ui-tag">PUNTOS: 0</div>
    </div>

    <!-- Contenedores de Juego -->
    <div id="memory-grid"></div>
    <div id="falling-area"><div id="falling-container"></div></div>
    <div id="fruits-table"></div>
    <div id="maze-container">
        <div id="maze-board"></div>
        <div id="maze-player"></div>
        <div id="maze-goal">🏁</div>
    </div>

    <div id="falling-targets">
        <div class="target-slot" id="target-circle" style="color: var(--accent-cyan); opacity: 0.6; display:flex; flex-direction:column; align-items:center;">
            <svg width="25" height="25" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="currentColor"/></svg>
            <span class="count-text" style="font-size:0.7rem">0/10</span>
        </div>
        <div class="target-slot" id="target-square" style="color: var(--accent-pink); opacity: 0.6; display:flex; flex-direction:column; align-items:center;">
            <svg width="25" height="25" viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" fill="currentColor"/></svg>
            <span class="count-text" style="font-size:0.7rem">0/10</span>
        </div>
        <div class="target-slot" id="target-triangle" style="color: var(--accent-green); opacity: 0.6; display:flex; flex-direction:column; align-items:center;">
            <svg width="25" height="25" viewBox="0 0 100 100"><polygon points="50,15 90,85 10,85" fill="currentColor"/></svg>
            <span class="count-text" style="font-size:0.7rem">0/10</span>
        </div>
        <div class="target-slot" id="target-star" style="color: var(--accent-yellow); opacity: 0.6; display:flex; flex-direction:column; align-items:center;">
            <svg width="25" height="25" viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 67,55 78,85 50,70 22,85 33,55 5,35 39,35" fill="currentColor"/></svg>
            <span class="count-text" style="font-size:0.7rem">0/10</span>
        </div>
    </div>

    <div id="maze-controls" class="maze-controls">
        <button class="ctrl-btn" onclick="moveMaze('up')">↑</button>
        <div style="display:flex; gap:10px;">
            <button class="ctrl-btn" onclick="moveMaze('left')">←</button>
            <button class="ctrl-btn" onclick="moveMaze('down')">↓</button>
            <button class="ctrl-btn" onclick="moveMaze('right')">→</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay-screen" style="display:none">
        <h2 style="color: var(--accent-amber); font-size: 2.5rem; font-family: var(--font-bold);">¡TRIUNFO! 🔔</h2>
        <div id="summary-container"></div>
        <button class="mode-btn" style="background: var(--accent-cyan); color: #000;" onclick="backToMenu()">MENÚ PRINCIPAL</button>
    </div>
</div>

<footer>tecnotips © - 2026 | GAMEUZIEL</footer>

<script>
    /** * REGISTRO DEL SERVICE WORKER (PWA)
     */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('ServiceWorker registrado con éxito:', registration.scope);
                })
                .catch(error => {
                    console.log('Error al registrar el ServiceWorker:', error);
                });
        });
    }

    const apiKey = ""; 
    const VOCALS = ['A', 'a', 'E', 'e', 'I', 'i', 'O', 'o', 'U', 'u'];
    const SHAPES = [
        { id: 'circle', color: 'var(--accent-cyan)' },
        { id: 'square', color: 'var(--accent-pink)' },
        { id: 'triangle', color: 'var(--accent-green)' },
        { id: 'star', color: 'var(--accent-yellow)' }
    ];
    const FRUITS_LIST = ['🍓', '🍎', '🍌', '🍇', '🍉', '🍊', '🍍', '🍒'];

    let state = { mode: null, score: 0, timeLeft: 120, active: false };
    let timerInt, spawnInt;
    let selectedCards = [];
    let matchesFound = 0;
    let totalPairs = 0;
    let shapeCounts = { circle: 0, square: 0, triangle: 0, star: 0 };
    let maze = { grid: [], size: 15, cellSize: 0, player: {x: 1, y: 1}, goal: {x: 13, y: 13} };

    // --- EFECTOS DE SONIDO Y LLUVIA DE CONFETI ---
    async function playTriumph() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playBell = (freq, startTime) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(0.5, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 1.5);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(startTime);
            osc.stop(startTime + 1.5);
        };
        playBell(880, ctx.currentTime);
        playBell(1108, ctx.currentTime + 0.1);
        playBell(1320, ctx.currentTime + 0.2);

        const end = Date.now() + 4000;
        const colors = ['#00bcd4', '#e91e63', '#ffc107', '#4caf50', '#9c27b0'];
        
        (function frame() {
            confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.6 },
                colors: colors
            });
            confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.6 },
                colors: colors
            });
            
            if (Math.random() > 0.7) {
                confetti({
                    particleCount: 2,
                    origin: { x: Math.random(), y: -0.1 },
                    gravity: 0.8,
                    scalar: 0.7,
                    colors: colors
                });
            }

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());

        const phrases = ["Say cheerfully: ¡Increíble! ¡Lograste el triunfo!", "Say cheerfully: ¡Felicidades! ¡Eres el mejor!"];
        const text = phrases[Math.floor(Math.random() * phrases.length)];
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                    }
                })
            });
            const result = await response.json();
            const pcm = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (pcm) {
                const blob = pcmToWav(pcm, 24000);
                new Audio(URL.createObjectURL(blob)).play();
            }
        } catch (e) {}
    }

    function pcmToWav(base64, sampleRate) {
        const byteChars = atob(base64);
        const buffer = new ArrayBuffer(byteChars.length);
        const view = new DataView(buffer);
        for (let i = 0; i < byteChars.length; i++) view.setUint8(i, byteChars.charCodeAt(i));
        const wavHeader = new ArrayBuffer(44);
        const hv = new DataView(wavHeader);
        hv.setUint32(0, 0x52494646, false); hv.setUint32(4, 36 + buffer.byteLength, true);
        hv.setUint32(8, 0x57415645, false); hv.setUint32(12, 0x666d7420, false);
        hv.setUint32(16, 16, true); hv.setUint16(20, 1, true); hv.setUint16(22, 1, true);
        hv.setUint32(24, sampleRate, true); hv.setUint32(28, sampleRate * 2, true);
        hv.setUint16(32, 2, true); hv.setUint16(34, 16, true);
        hv.setUint32(36, 0x64617461, false); hv.setUint32(40, buffer.byteLength, true);
        return new Blob([wavHeader, buffer], { type: "audio/wav" });
    }

    // --- LÓGICA DE NAVEGACIÓN ---
    function showDifficulty(mode) {
        state.mode = mode;
        document.getElementById('menu-overlay').style.display = 'none';
        document.getElementById('diff-overlay').style.display = 'flex';
    }

    function backToMenu() {
        state.active = false;
        clearInterval(timerInt);
        clearInterval(spawnInt);
        document.getElementById('menu-overlay').style.display = 'flex';
        document.getElementById('diff-overlay').style.display = 'none';
        document.getElementById('win-overlay').style.display = 'none';
        document.getElementById('game-ui').style.display = 'none';
        
        ['memory-grid', 'falling-area', 'fruits-table', 'maze-container', 'falling-targets', 'maze-controls'].forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
        document.getElementById('current-mode-label').innerText = "MENU";
    }

    function startGame(mode, diff) {
        state.mode = mode; state.score = 0; state.timeLeft = 120; state.active = true;
        matchesFound = 0; selectedCards = [];
        document.getElementById('menu-overlay').style.display = 'none';
        document.getElementById('diff-overlay').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        document.getElementById('win-overlay').style.display = 'none';
        document.getElementById('score-tag').innerText = `PUNTOS: 0`;

        if (mode === 'letters') initLetters(diff);
        if (mode === 'falling') initFalling();
        if (mode === 'fruits') initFruits();
        if (mode === 'maze') initMaze();

        startGlobalTimer();
    }

    // --- JUEGO: RETO DE LETRAS ---
    function initLetters(count) {
        const grid = document.getElementById('memory-grid');
        grid.style.display = 'flex';
        grid.style.flexWrap = 'wrap';
        grid.innerHTML = '';
        document.getElementById('current-mode-label').innerText = "VOCALES";
        
        totalPairs = count / 2;
        let pool = [...VOCALS].sort(() => 0.5 - Math.random()).slice(0, totalPairs);
        let deck = [...pool, ...pool].sort(() => 0.5 - Math.random());
        
        deck.forEach(val => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            card.innerHTML = `
                <div class="card-face card-front">?</div>
                <div class="card-face card-back">${val}</div>
            `;
            card.dataset.value = val;
            card.onclick = () => flipLetter(card);
            grid.appendChild(card);
        });
    }

    function flipLetter(card) {
        if (!state.active || card.classList.contains('flipped') || selectedCards.length >= 2) return;
        card.classList.add('flipped');
        selectedCards.push(card);

        if (selectedCards.length === 2) {
            const [c1, c2] = selectedCards;
            if (c1.dataset.value === c2.dataset.value) {
                state.score += 500;
                matchesFound++;
                selectedCards = [];
                document.getElementById('score-tag').innerText = `PUNTOS: ${state.score}`;
                if (matchesFound === totalPairs) setTimeout(winGame, 600);
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    selectedCards = [];
                }, 1000);
            }
        }
    }

    // --- JUEGO: FIESTA DE FRUTAS ---
    function initFruits() {
        const table = document.getElementById('fruits-table');
        table.style.display = 'block'; table.innerHTML = '';
        document.getElementById('current-mode-label').innerText = "FRUTAS";
        totalPairs = 6;
        let deck = [];
        const selection = [...FRUITS_LIST].sort(() => 0.5 - Math.random()).slice(0, totalPairs);
        selection.forEach(f => { deck.push(f); deck.push(f); });
        deck.sort(() => 0.5 - Math.random());
        
        deck.forEach((f, i) => {
            const card = document.createElement('div');
            card.className = 'fruit-card'; card.dataset.id = f; card.innerText = f;
            card.style.left = (Math.random() * 70 + 5) + '%';
            card.style.top = (Math.random() * 70 + 5) + '%';
            card.onclick = () => {
                if (!state.active || card.style.opacity === "0") return;
                if (selectedCards.length === 0) {
                    card.style.transform = "scale(1.2)";
                    selectedCards.push(card);
                } else {
                    const first = selectedCards[0];
                    if (first === card) return;
                    if (first.dataset.id === card.dataset.id) {
                        card.style.opacity = first.style.opacity = "0";
                        state.score += 300; matchesFound++;
                        document.getElementById('score-tag').innerText = `PUNTOS: ${state.score}`;
                        if (matchesFound === totalPairs) winGame();
                    } else {
                        first.style.transform = "scale(1)";
                    }
                    selectedCards = [];
                }
            };
            table.appendChild(card);
        });
    }

    // --- LLUVIA DE FIGURAS ---
    function initFalling() {
        const container = document.getElementById('falling-container');
        document.getElementById('falling-area').style.display = 'block';
        document.getElementById('falling-targets').style.display = 'flex';
        document.getElementById('current-mode-label').innerText = "FIGURAS";
        container.innerHTML = '';
        shapeCounts = { circle:0, square:0, triangle:0, star:0 };
        document.querySelectorAll('.target-slot').forEach(s => s.style.opacity = "0.6");

        spawnInt = setInterval(() => {
            if (!state.active) return;
            const config = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            const shape = document.createElement('div');
            shape.style.cssText = `position:absolute; width:60px; height:60px; left:${Math.random()*85}%; top:-80px; cursor:pointer;`;
            shape.innerHTML = `<svg viewBox="0 0 100 100">${getShapePath(config.id, config.color)}</svg>`;
            shape.onclick = () => {
                shape.remove();
                shapeCounts[config.id]++;
                state.score += 50;
                document.getElementById('score-tag').innerText = `PUNTOS: ${state.score}`;
                const slot = document.getElementById(`target-${config.id}`);
                slot.querySelector('.count-text').innerText = `${Math.min(10, shapeCounts[config.id])}/10`;
                if(shapeCounts[config.id] >= 10) slot.style.opacity = "1";
                if(Object.values(shapeCounts).every(v => v >= 10)) winGame();
            };
            container.appendChild(shape);
            let y = -80;
            const anim = setInterval(() => {
                if(!state.active) { clearInterval(anim); return; }
                y += 3; shape.style.top = y + 'px';
                if(y > 900) { shape.remove(); clearInterval(anim); }
            }, 16);
        }, 1000);
    }

    function getShapePath(type, color) {
        if (type === 'circle') return `<circle cx="50" cy="50" r="40" fill="${color}"/>`;
        if (type === 'square') return `<rect x="15" y="15" width="70" height="70" fill="${color}"/>`;
        if (type === 'triangle') return `<polygon points="50,15 90,85 10,85" fill="${color}"/>`;
        return `<polygon points="50,5 61,35 95,35 67,55 78,85 50,70 22,85 33,55 5,35 39,35" fill="${color}"/>`;
    }

    // --- LABERINTO ---
    function initMaze() {
        const container = document.getElementById('maze-container');
        container.style.display = 'block';
        document.getElementById('maze-controls').style.display = 'flex';
        document.getElementById('current-mode-label').innerText = "LABERINTO";
        const board = document.getElementById('maze-board');
        board.innerHTML = '';
        maze.size = 15;
        maze.cellSize = container.clientWidth / maze.size;
        maze.grid = Array(maze.size).fill().map(() => Array(maze.size).fill(0));
        
        function carve(x, y) {
            maze.grid[y][x] = 1;
            const d = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            for(let [dx,dy] of d) {
                let nx = x+dx, ny = y+dy;
                if(nx > 0 && nx < maze.size-1 && ny > 0 && ny < maze.size-1 && maze.grid[ny][nx] === 0) {
                    maze.grid[y+dy/2][x+dx/2] = 1; carve(nx, ny);
                }
            }
        }
        carve(1, 1);
        maze.grid[13][13] = 1;
        
        for(let y=0; y<maze.size; y++) {
            for(let x=0; x<maze.size; x++) {
                if(maze.grid[y][x] === 0) {
                    const w = document.createElement('div');
                    w.className = 'maze-wall';
                    w.style.width = w.style.height = maze.cellSize + 'px';
                    w.style.left = (x * maze.cellSize) + 'px';
                    w.style.top = (y * maze.cellSize) + 'px';
                    board.appendChild(w);
                }
            }
        }
        maze.player = {x: 1, y: 1};
        const g = document.getElementById('maze-goal');
        g.style.width = g.style.height = maze.cellSize + 'px';
        g.style.left = (13 * maze.cellSize) + 'px'; g.style.top = (13 * maze.cellSize) + 'px';
        updateMaze();
    }

    function moveMaze(dir) {
        let nx = maze.player.x, ny = maze.player.y;
        if(dir==='up') ny--; if(dir==='down') ny++; if(dir==='left') nx--; if(dir==='right') nx++;
        if(maze.grid[ny][nx] === 1) {
            maze.player.x = nx; maze.player.y = ny; updateMaze();
            if(nx === 13 && ny === 13) { state.score += 2000; winGame(); }
        }
    }

    function updateMaze() {
        const p = document.getElementById('maze-player');
        p.style.width = p.style.height = (maze.cellSize * 0.7) + 'px';
        p.style.left = (maze.player.x * maze.cellSize + maze.cellSize * 0.15) + 'px';
        p.style.top = (maze.player.y * maze.cellSize + maze.cellSize * 0.15) + 'px';
    }

    // --- CORE ---
    function startGlobalTimer() {
        if(timerInt) clearInterval(timerInt);
        timerInt = setInterval(() => {
            state.timeLeft--;
            const m = Math.floor(state.timeLeft / 60);
            const s = state.timeLeft % 60;
            document.getElementById('timer-tag').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            if (state.timeLeft <= 0) winGame();
        }, 1000);
    }

    function winGame() {
        state.active = false;
        clearInterval(timerInt); clearInterval(spawnInt);
        document.getElementById('summary-container').innerHTML = `<h3 style="color:var(--accent-cyan)">PUNTUACIÓN FINAL: ${state.score}</h3>`;
        document.getElementById('win-overlay').style.display = 'flex';
        playTriumph();
    }

    window.addEventListener('keydown', (e) => {
        if(state.mode === 'maze') moveMaze(e.key.replace('Arrow','').toLowerCase());
    });
</script>
</body>
