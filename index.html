<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameUziel - Multijuegos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --sun:    #FFD600;
            --sky:    #00C8FF;
            --grass:  #4CD964;
            --berry:  #FF3B6E;
            --tangy:  #FF6B35;
            --grape:  #A855F7;
            --mint:   #00E5A0;
            --bg:     #FFF5E4;
            --bg2:    #FFE8CC;
            --txt:    #3D1C00;
            --shadow: rgba(61,28,0,0.18);
            --font-h: 'Fredoka One', cursive;
            --font-b: 'Baloo 2', cursive;
        }

        * { box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            font-family: var(--font-b);
            background: var(--bg);
            overflow: hidden;
            color: var(--txt);
        }

        /* ── Fondo animado con nubes y estrellas ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(255,214,0,.22) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 15%, rgba(0,200,255,.18) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 90%, rgba(76,217,100,.15) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        /* ══════════════ HEADER ══════════════ */
        header {
            position: relative; z-index: 1000;
            height: 64px;
            background: linear-gradient(135deg, #FF6B35, #FF3B6E);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px;
            box-shadow: 0 5px 0 rgba(0,0,0,.15);
        }
        .hdr-logo {
            font-family: var(--font-h);
            font-size: 1.7rem;
            color: white;
            text-shadow: 2px 3px 0 rgba(0,0,0,.2);
            letter-spacing: .03em;
        }
        .hdr-mode {
            font-family: var(--font-h);
            font-size: 1rem;
            color: var(--sun);
            background: rgba(0,0,0,.18);
            padding: 4px 12px; border-radius: 20px;
        }

        /* ══════════════ GAME AREA ══════════════ */
        #game-area {
            flex: 1; position: relative;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            z-index: 1;
        }

        /* ══════════════ OVERLAY SCREENS ══════════════ */
        .overlay-screen {
            position: absolute; inset: 0;
            background: linear-gradient(160deg, #FFF5E4 0%, #FFE8CC 100%);
            z-index: 2000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; gap: 14px; text-align: center;
        }

        /* ══════════════ MENU ══════════════ */
        .menu-title {
            font-family: var(--font-h);
            font-size: 2.8rem;
            color: var(--tangy);
            text-shadow: 3px 4px 0 rgba(0,0,0,.12);
            margin-bottom: 4px;
            animation: titleBounce 2s ease-in-out infinite;
        }
        @keyframes titleBounce {
            0%,100% { transform: translateY(0) rotate(-1deg); }
            50%      { transform: translateY(-8px) rotate(1deg); }
        }

        .menu-subtitle {
            font-size: .95rem; color: #9B6A3A;
            margin-bottom: 6px; font-weight: 700;
        }

        .mode-btn {
            width: 100%; max-width: 320px;
            padding: 18px 20px;
            border: none; border-radius: 28px;
            font-family: var(--font-h);
            font-size: 1.25rem;
            color: white;
            box-shadow: 0 7px 0 rgba(0,0,0,.22), inset 0 2px 0 rgba(255,255,255,.3);
            cursor: pointer;
            transition: transform .1s, box-shadow .1s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-shadow: 1px 2px 0 rgba(0,0,0,.2);
            position: relative; overflow: hidden;
            animation: btnWiggle 3s ease-in-out infinite;
        }
        .mode-btn:nth-child(2) { animation-delay: .2s; }
        .mode-btn:nth-child(3) { animation-delay: .4s; }
        .mode-btn:nth-child(4) { animation-delay: .6s; }
        .mode-btn:nth-child(5) { animation-delay: .8s; }

        @keyframes btnWiggle {
            0%,90%,100% { transform: scale(1); }
            93%          { transform: scale(1.04) rotate(.5deg); }
            96%          { transform: scale(1.04) rotate(-.5deg); }
        }
        .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,.22); }
        .mode-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 60%);
            border-radius: inherit; pointer-events: none;
        }

        .btn-letters  { background: linear-gradient(135deg, #A855F7, #7C3AED); }
        .btn-falling  { background: linear-gradient(135deg, #00C8FF, #0EA5E9); }
        .btn-fruits   { background: linear-gradient(135deg, #FF3B6E, #E11D48); }
        .btn-maze     { background: linear-gradient(135deg, #FF6B35, #F97316); }
        .btn-diff-easy   { background: linear-gradient(135deg, #4CD964, #16A34A); }
        .btn-diff-med    { background: linear-gradient(135deg, #FF6B35, #EA580C); }
        .btn-diff-hard   { background: linear-gradient(135deg, #FF3B6E, #BE123C); }
        .btn-back     { background: linear-gradient(135deg, #94A3B8, #64748B); }
        .btn-menu     { background: linear-gradient(135deg, #FF6B35, #F97316); }

        /* ══════════════ GAME UI OVERLAY ══════════════ */
        .game-ui-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 10px 14px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1500; pointer-events: none;
        }
        .ui-tag {
            pointer-events: auto;
            padding: 8px 14px; border-radius: 18px;
            font-family: var(--font-h); font-size: .9rem;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 3px 0 rgba(0,0,0,.15);
        }
        #score-tag {
            background: linear-gradient(135deg, #4CD964, #16A34A);
            color: white;
            animation: scorePop 0s;
        }
        @keyframes scorePop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.35); }
            100% { transform: scale(1); }
        }
        .score-pop { animation: scorePop .35s cubic-bezier(.175,.885,.32,1.275) both; }

        #timer-tag { background: linear-gradient(135deg, #FF3B6E, #BE123C); color: white; }
        #timer-tag.urgent { animation: timerUrgent .5s ease infinite alternate; }
        @keyframes timerUrgent {
            from { transform: scale(1); background: linear-gradient(135deg,#FF3B6E,#BE123C); }
            to   { transform: scale(1.08); background: linear-gradient(135deg,#FF0000,#7F0000); }
        }
        .btn-back-ui {
            pointer-events: auto;
            background: rgba(255,255,255,.92);
            border: 3px solid rgba(0,0,0,.1);
            color: var(--txt); border-radius: 22px;
            padding: 12px 20px; font-family: var(--font-h); font-size: 1.6rem;
            box-shadow: 0 5px 0 rgba(0,0,0,.15);
            cursor: pointer;
            line-height: 1;
        }

        /* ══════════════ LETRAS / MEMORIA ══════════════ */
        #memory-grid {
            display: none; gap: 14px; padding: 70px 16px 16px;
            justify-content: center; align-content: center;
            width: 100%; height: 100%; flex-wrap: wrap;
        }
        .letter-card {
            width: 122px; height: 170px;
            position: relative; transform-style: preserve-3d;
            transition: transform .5s cubic-bezier(.34,1.56,.64,1);
            cursor: pointer;
            animation: cardFloat 3s ease-in-out infinite;
        }
        .letter-card:nth-child(odd)  { animation-delay: .3s; }
        .letter-card:nth-child(3n)   { animation-delay: .6s; }
        @keyframes cardFloat {
            0%,100% { transform: translateY(0) rotateZ(0); }
            50%      { transform: translateY(-5px) rotateZ(.5deg); }
        }
        .letter-card.flipped { transform: rotateY(180deg) !important; animation: none; }
        .letter-card.matched { animation: matchedDance .6s cubic-bezier(.175,.885,.32,1.275) both; }
        @keyframes matchedDance {
            0%   { transform: scale(1) rotateY(180deg); }
            30%  { transform: scale(1.25) rotateY(180deg) rotate(-8deg); }
            60%  { transform: scale(1.25) rotateY(180deg) rotate(8deg); }
            100% { transform: scale(1) rotateY(180deg); }
        }
        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-size: 4.6rem;
        }
        .card-front {
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            box-shadow: 0 6px 0 #5B21B6, 0 8px 20px rgba(124,58,237,.4);
            color: rgba(255,255,255,.25); font-size: 2.5rem;
        }
        .card-front::before {
            content: '?';
            color: rgba(255,255,255,.5);
            font-size: 3.5rem;
            font-family: var(--font-h);
        }
        .card-back {
            background: linear-gradient(135deg, #FF6B35, #FF3B6E);
            box-shadow: 0 6px 0 #C2410C, 0 8px 20px rgba(255,107,53,.4);
            color: white; transform: rotateY(180deg);
            text-shadow: 2px 3px 0 rgba(0,0,0,.2);
        }

        /* ══════════════ FRUTAS ══════════════ */
        #fruits-table {
            display: none; position: absolute;
            top: 60px; bottom: 10px;
            width: 96%; max-width: 800px;
            background: radial-gradient(ellipse at 30% 30%, #E0F7FF, #C8F0E0);
            border-radius: 30px; overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,.12);
        }
        .fruit-card {
            position: absolute; width: 88px; height: 88px;
            background: white;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; font-size: 2.8rem;
            box-shadow: 0 6px 0 rgba(0,0,0,.15), 0 8px 20px rgba(0,0,0,.1);
            transition: transform .2s cubic-bezier(.34,1.56,.64,1);
            animation: fruitBob 2.5s ease-in-out infinite;
            border: 4px solid rgba(255,255,255,.8);
        }
        .fruit-card:nth-child(odd)   { animation-delay: .4s; }
        .fruit-card:nth-child(3n)    { animation-delay: .8s; }
        .fruit-card:nth-child(4n)    { animation-delay: 1.2s; }
        @keyframes fruitBob {
            0%,100% { transform: translateY(0) rotate(0); }
            50%      { transform: translateY(-7px) rotate(4deg); }
        }
        .fruit-card.selected {
            transform: scale(1.2) rotate(-5deg) !important;
            box-shadow: 0 10px 0 rgba(0,0,0,.2), 0 14px 30px rgba(255,107,53,.5);
            animation: fruitSelected .4s ease-in-out infinite alternate;
        }
        @keyframes fruitSelected {
            from { box-shadow: 0 10px 0 rgba(0,0,0,.2), 0 0 20px rgba(255,107,53,.5); }
            to   { box-shadow: 0 10px 0 rgba(0,0,0,.2), 0 0 35px rgba(255,107,53,.9); }
        }
        .fruit-card.matched-fruit {
            animation: fruitPop .5s cubic-bezier(.175,.885,.32,1.275) forwards !important;
        }
        @keyframes fruitPop {
            0%   { transform: scale(1.2); opacity: 1; }
            50%  { transform: scale(1.6); opacity: .8; }
            100% { transform: scale(0);   opacity: 0; }
        }

        /* ══════════════ LLUVIA DE FIGURAS ══════════════ */
        #falling-area { display: none; position: absolute; inset: 0; overflow: hidden; }
        #falling-container {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 600px; height: 100%;
        }
        .falling-shape {
            position: absolute; cursor: pointer;
            transition: transform .1s;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,.25));
            animation: shapeSpin 4s linear infinite;
        }
        @keyframes shapeSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .falling-shape:active { transform: scale(1.4) !important; }
        .falling-shape.hit {
            animation: shapeHit .4s cubic-bezier(.175,.885,.32,1.275) forwards !important;
        }
        @keyframes shapeHit {
            0%   { transform: scale(1); opacity: 1; }
            50%  { transform: scale(1.8); opacity: .7; }
            100% { transform: scale(0); opacity: 0; }
        }

        #falling-targets {
            display: none; position: absolute; bottom: 20px;
            left: 50%; transform: translateX(-50%);
            width: 96%; max-width: 600px;
            background: rgba(255,255,255,.92);
            padding: 12px 16px; border-radius: 28px;
            justify-content: space-around;
            border: 4px solid white;
            box-shadow: 0 6px 0 rgba(0,0,0,.12), 0 10px 30px rgba(0,0,0,.1);
            z-index: 1000;
        }
        .target-slot {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            padding: 8px; border-radius: 16px;
            transition: all .3s;
            font-family: var(--font-h);
        }
        .target-slot.complete {
            background: rgba(76,217,100,.2);
            animation: slotComplete .5s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes slotComplete {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25) rotate(5deg); }
            100% { transform: scale(1); }
        }
        .count-text { font-size: .85rem; font-weight: 800; }

        /* ══════════════ LABERINTO ══════════════ */
        #maze-container {
            display: none; position: relative;
            width: min(92vw, 55vh); height: min(92vw, 55vh);
            max-width: 440px; max-height: 440px;
            border-radius: 16px; overflow: hidden;
            border: 6px solid var(--tangy);
            box-shadow: 0 8px 0 #C2410C, 0 14px 30px rgba(0,0,0,.2);
            margin-top: 56px; margin-bottom: 0;
        }
        #maze-board { position: absolute; inset: 0; background: #FFF5E4; }
        .maze-wall {
            position: absolute;
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border-radius: 3px;
        }
        .maze-path { position: absolute; background: #FFF5E4; }
        #maze-player {
            position: absolute; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            transition: left .12s cubic-bezier(.34,1.56,.64,1), top .12s cubic-bezier(.34,1.56,.64,1);
            filter: drop-shadow(0 3px 6px rgba(0,0,0,.3));
            animation: playerBounce .5s ease-in-out infinite alternate;
        }
        @keyframes playerBounce {
            from { transform: scale(1) translateY(0); }
            to   { transform: scale(1.1) translateY(-2px); }
        }
        #maze-goal {
            position: absolute; z-index: 90;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            animation: goalPulse 1s ease-in-out infinite alternate;
            filter: drop-shadow(0 3px 8px rgba(76,217,100,.6));
        }
        @keyframes goalPulse {
            from { transform: scale(1); filter: drop-shadow(0 3px 8px rgba(76,217,100,.4)); }
            to   { transform: scale(1.2); filter: drop-shadow(0 4px 14px rgba(76,217,100,.9)); }
        }

        /* Controles del laberinto — D-pad táctil grande */
        #maze-controls {
            display: none; position: absolute; bottom: 0px;
            width: 100%; justify-content: center; gap: 0; padding: 8px 4px; z-index: 1200;
        }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; margin-top: 14px; }
        .ctrl-btn {
            width: 60px; height: 60px; border-radius: 18px;
            background: linear-gradient(135deg, #FF6B35, #FF3B6E);
            border: none; color: white; font-size: 1.6rem;
            box-shadow: 0 5px 0 rgba(0,0,0,.2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform .1s, box-shadow .1s;
            font-family: var(--font-h);
        }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.2); }
        .ctrl-empty { width: 60px; height: 60px; }

        /* ══════════════ WIN SCREEN ══════════════ */
        #win-overlay {
            background: linear-gradient(160deg, #FFF5E4, #FFE8CC) !important;
        }
        .win-emoji {
            font-size: 5rem;
            animation: winEmoji .6s cubic-bezier(.175,.885,.32,1.275) both;
        }
        @keyframes winEmoji {
            0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
            80%  { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .win-title {
            font-family: var(--font-h);
            font-size: 2.8rem;
            color: var(--tangy);
            text-shadow: 3px 4px 0 rgba(0,0,0,.12);
            animation: winTitle .5s .15s cubic-bezier(.175,.885,.32,1.275) both;
        }
        @keyframes winTitle {
            from { transform: scale(.5) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }
        .win-score {
            font-family: var(--font-h); font-size: 2rem;
            background: linear-gradient(135deg, var(--grape), var(--tangy));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: winTitle .5s .3s both;
        }
        .win-stars {
            font-size: 2.5rem;
            animation: winTitle .5s .45s both;
        }

        /* ══════════════ FLOATING STARS EFFECT ══════════════ */
        .burst-star {
            position: fixed; pointer-events: none; z-index: 9999;
            font-size: 1.8rem;
            animation: burstFly 1s ease-out forwards;
        }
        @keyframes burstFly {
            0%   { transform: scale(0) translateY(0); opacity: 1; }
            60%  { opacity: 1; }
            100% { transform: scale(1.2) translateY(-90px); opacity: 0; }
        }

        /* ══════════════ DIFFICULTY SCREEN ══════════════ */
        #diff-overlay { background: linear-gradient(160deg, #FFF5E4, #FFE8CC) !important; }

        /* ══════════════ FOOTER ══════════════ */
        footer {
            height: 36px; position: relative; z-index: 1;
            background: linear-gradient(135deg, #FF6B35, #FF3B6E);
            color: rgba(255,255,255,.7);
            display: flex; align-items: center; justify-content: center;
            font-size: .65rem; font-weight: 700; letter-spacing: .12em;
        }

        /* ══════════════ DIFF OVERLAY ══════════════ */
        .diff-title {
            font-family: var(--font-h); font-size: 1.7rem;
            color: var(--tangy); text-shadow: 2px 3px 0 rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

<header>
    <div class="hdr-logo">🎮 GameUziel</div>
    <div class="hdr-mode" id="current-mode-label">MENÚ</div>
</header>

<div id="game-area">

    <!-- ══ MENÚ PRINCIPAL ══ -->
    <div id="menu-overlay" class="overlay-screen">
        <div style="font-size:4rem; animation: titleBounce 1.5s ease-in-out infinite">🎉</div>
        <h1 class="menu-title">¡GameUziel!</h1>
        <p class="menu-subtitle">Elige tu juego favorito 👇</p>
        <button class="mode-btn btn-letters" onclick="showDifficulty('letters')">🔤 Reto de Letras</button>
        <button class="mode-btn btn-falling" onclick="startGame('falling')">🌈 Lluvia de Figuras</button>
        <button class="mode-btn btn-fruits"  onclick="startGame('fruits')">🍓 Fiesta de Frutas</button>
        <button class="mode-btn btn-maze"    onclick="startGame('maze')">🌀 El Laberinto</button>
    </div>

    <!-- ══ SELECTOR DE DIFICULTAD ══ -->
    <div id="diff-overlay" class="overlay-screen" style="display:none">
        <div style="font-size:3rem">🃏</div>
        <h2 class="diff-title">¿Cuántas cartas?</h2>
        <button class="mode-btn btn-diff-easy" onclick="startGame(state.mode, 4)">😊 4 Cartas — Fácil</button>
        <button class="mode-btn btn-diff-med"  onclick="startGame(state.mode, 6)">😃 6 Cartas — Medio</button>
        <button class="mode-btn btn-diff-hard" onclick="startGame(state.mode, 8)">🤩 8 Cartas — Difícil</button>
        <button class="mode-btn btn-back"      onclick="backToMenu()">← Volver</button>
    </div>

    <!-- ══ HUD ══ -->
    <div class="game-ui-overlay" id="game-ui" style="display:none">
        <button class="btn-back-ui" onclick="backToMenu()">🏠</button>
        <div id="timer-tag" class="ui-tag">⏱ 2:00</div>
        <div id="score-tag" class="ui-tag">⭐ 0</div>
    </div>

    <!-- ══ CONTENEDORES DE JUEGO ══ -->
    <div id="memory-grid" style="display:none;flex-wrap:wrap;"></div>
    <div id="falling-area"><div id="falling-container"></div></div>
    <div id="fruits-table"></div>
    <div id="maze-container">
        <div id="maze-board"></div>
        <div id="maze-player">🐣</div>
        <div id="maze-goal">🌟</div>
    </div>

    <!-- Targets lluvia -->
    <div id="falling-targets">
        <div class="target-slot" id="target-circle">
            <svg width="42" height="42" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#00C8FF"/></svg>
            <span class="count-text" style="color:#0EA5E9">0/10</span>
        </div>
        <div class="target-slot" id="target-square">
            <svg width="42" height="42" viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" rx="10" fill="#FF3B6E"/></svg>
            <span class="count-text" style="color:#E11D48">0/10</span>
        </div>
        <div class="target-slot" id="target-triangle">
            <svg width="42" height="42" viewBox="0 0 100 100"><polygon points="50,10 92,88 8,88" fill="#4CD964"/></svg>
            <span class="count-text" style="color:#16A34A">0/10</span>
        </div>
        <div class="target-slot" id="target-star">
            <svg width="42" height="42" viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 67,55 78,85 50,70 22,85 33,55 5,35 39,35" fill="#FFD600"/></svg>
            <span class="count-text" style="color:#CA8A04">0/10</span>
        </div>
    </div>

    <!-- Controles laberinto -->
    <div id="maze-controls" class="maze-controls">
        <div class="dpad">
            <div class="ctrl-empty"></div>
            <button class="ctrl-btn" onclick="moveMaze('up')">⬆️</button>
            <div class="ctrl-empty"></div>
            <button class="ctrl-btn" onclick="moveMaze('left')">⬅️</button>
            <div class="ctrl-empty"></div>
            <button class="ctrl-btn" onclick="moveMaze('right')">➡️</button>
            <div class="ctrl-empty"></div>
            <button class="ctrl-btn" onclick="moveMaze('down')">⬇️</button>
            <div class="ctrl-empty"></div>
        </div>
    </div>

    <!-- ══ WIN SCREEN ══ -->
    <div id="win-overlay" class="overlay-screen" style="display:none">
        <div class="win-emoji" id="win-emoji">🏆</div>
        <h2 class="win-title">¡LO LOGRASTE!</h2>
        <div class="win-stars" id="win-stars">⭐⭐⭐</div>
        <div class="win-score" id="win-score">1000 puntos</div>
        <button class="mode-btn btn-menu" onclick="backToMenu()">🏠 Menú Principal</button>
    </div>
</div>

<footer>TECNOTIPS <span style="font-size:.8rem">©</span> 2026 &nbsp;·&nbsp; TECNOLOGÍA CON PROPÓSITO</footer>

<script>
/* ══════════════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => {
                reg.addEventListener('updatefound', () => {
                    const w = reg.installing;
                    w.addEventListener('statechange', () => {
                        if (w.state === 'installed' && navigator.serviceWorker.controller)
                            window.location.reload();
                    });
                });
            }).catch(() => {});
        navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data?.type === 'SW_UPDATED') window.location.reload();
        });
    });
}

/* ══════════════════════════════════════════════
   DATOS
══════════════════════════════════════════════ */
const VOCALS     = ['A','a','E','e','I','i','O','o','U','u'];
const SHAPES     = [
    { id:'circle',   color:'#00C8FF', size:70 },
    { id:'square',   color:'#FF3B6E', size:70 },
    { id:'triangle', color:'#4CD964', size:70 },
    { id:'star',     color:'#FFD600', size:70 },
];
const FRUITS_LIST = ['🍓','🍎','🍌','🍇','🍉','🍊','🍍','🍒','🥭','🍑','🍋'];
const apiKey = "";

let state = { mode:null, score:0, timeLeft:120, active:false };
let timerInt, spawnInt;
let selectedCards = [], matchesFound = 0, totalPairs = 0;
let shapeCounts   = { circle:0, square:0, triangle:0, star:0 };
let maze = { grid:[], size:15, cellSize:0, player:{x:1,y:1}, goal:{x:13,y:13} };

/* ══════════════════════════════════════════════
   SONIDOS WEB AUDIO
══════════════════════════════════════════════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, dur = .15, type = 'sine', vol = .35) {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
}

function playHappy() {
    // Do-Mi-Sol-Do8 alegre
    [[523,.0],[659,.1],[784,.2],[1047,.32]].forEach(([f,d]) => {
        setTimeout(() => playTone(f, .2, 'sine', .3), d*1000);
    });
}

function playMatch() {
    // acorde de match
    [[880,.0],[1100,.08],[1320,.16]].forEach(([f,d]) => {
        setTimeout(() => playTone(f, .25, 'triangle', .28), d*1000);
    });
}

function playWrong() {
    playTone(220, .25, 'sawtooth', .2);
    setTimeout(() => playTone(180, .3, 'sawtooth', .15), 120);
}

function playClick() {
    playTone(660, .08, 'sine', .2);
}

function playWin() {
    const melody = [[523,.0],[659,.1],[784,.2],[1047,.32],[784,.5],[880,.62],[1047,.74]];
    melody.forEach(([f,d]) => setTimeout(() => playTone(f, .3, 'triangle', .35), d*1000));
}

async function playTriumph() {
    playWin();
    const end = Date.now() + 5000;
    const colors = ['#FF6B35','#FF3B6E','#FFD600','#4CD964','#00C8FF','#A855F7'];
    (function frame() {
        confetti({ particleCount:7, angle:60,  spread:60, origin:{x:0, y:.65}, colors });
        confetti({ particleCount:7, angle:120, spread:60, origin:{x:1, y:.65}, colors });
        if (Math.random() > .65)
            confetti({ particleCount:4, origin:{x:Math.random(), y:-.1}, gravity:.85, scalar:.8, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());

    const phrases = ["Say with joy: ¡Increíble! ¡Lo lograste!", "Say with joy: ¡Felicidades! ¡Eres el mejor!"];
    const text = phrases[Math.floor(Math.random() * phrases.length)];
    if (!apiKey) return;
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ contents:[{parts:[{text}]}],
                generationConfig:{ responseModalities:["AUDIO"],
                speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:"Puck"}}} } })
        });
        const result = await res.json();
        const pcm = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if (pcm) new Audio(URL.createObjectURL(pcmToWav(pcm, 24000))).play();
    } catch(e) {}
}

function pcmToWav(base64, sampleRate) {
    const byteChars = atob(base64), buf = new ArrayBuffer(byteChars.length);
    const view = new DataView(buf);
    for (let i=0;i<byteChars.length;i++) view.setUint8(i, byteChars.charCodeAt(i));
    const wh = new ArrayBuffer(44), hv = new DataView(wh);
    hv.setUint32(0,0x52494646,false); hv.setUint32(4,36+buf.byteLength,true);
    hv.setUint32(8,0x57415645,false); hv.setUint32(12,0x666d7420,false);
    hv.setUint32(16,16,true); hv.setUint16(20,1,true); hv.setUint16(22,1,true);
    hv.setUint32(24,sampleRate,true); hv.setUint32(28,sampleRate*2,true);
    hv.setUint16(32,2,true); hv.setUint16(34,16,true);
    hv.setUint32(36,0x64617461,false); hv.setUint32(40,buf.byteLength,true);
    return new Blob([wh,buf], {type:"audio/wav"});
}

/* ══════════════════════════════════════════════
   EFECTO ESTRELLAS AL TOCAR
══════════════════════════════════════════════ */
function burstStars(x, y, count = 5) {
    const emojis = ['⭐','✨','🌟','💫','🎉'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'burst-star';
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (x + (Math.random()-0.5)*60) + 'px';
        el.style.top  = y + 'px';
        el.style.animationDelay = (i * 0.06) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1100);
    }
}

/* ══════════════════════════════════════════════
   SCORE ANIMADO
══════════════════════════════════════════════ */
function addScore(pts) {
    state.score += pts;
    const tag = document.getElementById('score-tag');
    tag.innerText = `⭐ ${state.score}`;
    tag.classList.remove('score-pop');
    void tag.offsetWidth;
    tag.classList.add('score-pop');
}

/* ══════════════════════════════════════════════
   NAVEGACIÓN
══════════════════════════════════════════════ */
function showDifficulty(mode) {
    playClick();
    state.mode = mode;
    document.getElementById('menu-overlay').style.display = 'none';
    document.getElementById('diff-overlay').style.display = 'flex';
}

function backToMenu() {
    playClick();
    state.active = false;
    clearInterval(timerInt); clearInterval(spawnInt);
    ['menu-overlay'].forEach(id => document.getElementById(id).style.display = 'flex');
    ['diff-overlay','win-overlay','game-ui'].forEach(id =>
        document.getElementById(id).style.display = 'none');
    ['memory-grid','falling-area','fruits-table','maze-container','falling-targets','maze-controls']
        .forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('current-mode-label').innerText = 'MENÚ';
}

function startGame(mode, diff) {
    playClick();
    state.mode = mode; state.score = 0; state.timeLeft = 120; state.active = true;
    matchesFound = 0; selectedCards = [];
    ['menu-overlay','diff-overlay','win-overlay'].forEach(id =>
        document.getElementById(id).style.display = 'none');
    document.getElementById('game-ui').style.display = 'flex';
    document.getElementById('score-tag').innerText = '⭐ 0';
    document.getElementById('timer-tag').innerText = '⏱ 2:00';
    document.getElementById('timer-tag').classList.remove('urgent');
    if (mode==='letters')  initLetters(diff);
    if (mode==='falling')  initFalling();
    if (mode==='fruits')   initFruits();
    if (mode==='maze')     initMaze();
    startGlobalTimer();
}

/* ══════════════════════════════════════════════
   JUEGO: RETO DE LETRAS
══════════════════════════════════════════════ */
function initLetters(count) {
    const grid = document.getElementById('memory-grid');
    grid.style.display = 'flex'; grid.innerHTML = '';
    document.getElementById('current-mode-label').innerText = '🔤 VOCALES';
    totalPairs = count / 2;
    const pool = [...VOCALS].sort(() => .5-Math.random()).slice(0, totalPairs);
    const deck = [...pool, ...pool].sort(() => .5-Math.random());
    deck.forEach(val => {
        const card = document.createElement('div');
        card.className = 'letter-card';
        card.innerHTML = `<div class="card-face card-front"></div><div class="card-face card-back">${val}</div>`;
        card.dataset.value = val;
        card.onclick = (e) => {
            if (AC.state === 'suspended') AC.resume();
            flipLetter(card, e);
        };
        grid.appendChild(card);
    });
}

function flipLetter(card, e) {
    if (!state.active || card.classList.contains('flipped') || card.classList.contains('matched') || selectedCards.length >= 2) return;
    playTone(700 + Math.random()*200, .12, 'sine', .25);
    card.classList.add('flipped');
    selectedCards.push(card);
    if (selectedCards.length === 2) {
        const [c1, c2] = selectedCards;
        if (c1.dataset.value.toUpperCase() === c2.dataset.value.toUpperCase()) {
            playMatch();
            if (e) burstStars(e.clientX, e.clientY, 6);
            c1.classList.add('matched'); c2.classList.add('matched');
            addScore(500);
            matchesFound++;
            selectedCards = [];
            if (matchesFound === totalPairs) setTimeout(winGame, 700);
        } else {
            playWrong();
            setTimeout(() => {
                c1.classList.remove('flipped'); c2.classList.remove('flipped');
                selectedCards = [];
            }, 900);
        }
    }
}

/* ══════════════════════════════════════════════
   JUEGO: FIESTA DE FRUTAS
══════════════════════════════════════════════ */
function initFruits() {
    const table = document.getElementById('fruits-table');
    table.style.display = 'block'; table.innerHTML = '';
    document.getElementById('current-mode-label').innerText = '🍓 FRUTAS';
    totalPairs = 9; matchesFound = 0; selectedCards = [];
    const selection = [...FRUITS_LIST].sort(() => .5-Math.random()).slice(0, totalPairs);
    const deck = [...selection, ...selection].sort(() => .5-Math.random());
    deck.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'fruit-card';
        card.dataset.id = f; card.innerText = f;
        card.style.left = (Math.random() * 68 + 4) + '%';
        card.style.top  = (Math.random() * 68 + 4) + '%';
        card.style.animationDelay = (i * 0.15) + 's';
        card.onclick = (e) => {
            if (AC.state === 'suspended') AC.resume();
            if (!state.active || card.classList.contains('matched-fruit')) return;
            if (selectedCards.length === 0) {
                playTone(600, .1, 'sine', .2);
                card.classList.add('selected');
                selectedCards.push(card);
            } else {
                const first = selectedCards[0];
                if (first === card) return;
                if (first.dataset.id === card.dataset.id) {
                    playMatch();
                    if (e) burstStars(e.clientX, e.clientY, 7);
                    card.classList.remove('selected');
                    first.classList.add('matched-fruit'); card.classList.add('matched-fruit');
                    addScore(300); matchesFound++;
                    if (matchesFound === totalPairs) setTimeout(winGame, 600);
                } else {
                    playWrong();
                    first.classList.remove('selected');
                }
                selectedCards = [];
            }
        };
        table.appendChild(card);
    });
}

/* ══════════════════════════════════════════════
   JUEGO: LLUVIA DE FIGURAS
══════════════════════════════════════════════ */
function initFalling() {
    const container = document.getElementById('falling-container');
    document.getElementById('falling-area').style.display = 'block';
    document.getElementById('falling-targets').style.display = 'flex';
    document.getElementById('current-mode-label').innerText = '🌈 FIGURAS';
    container.innerHTML = '';
    shapeCounts = { circle:0, square:0, triangle:0, star:0 };
    document.querySelectorAll('.target-slot').forEach(s => {
        s.style.opacity = '.5';
        s.classList.remove('complete');
    });

    spawnInt = setInterval(() => {
        if (!state.active) return;
        const cfg = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        const shape = document.createElement('div');
        shape.className = 'falling-shape';
        const sz = 66 + Math.random() * 36;
        shape.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*85}%;top:-90px;`;
        shape.innerHTML = `<svg viewBox="0 0 100 100" width="${sz}" height="${sz}" style="display:block">${getShapePath(cfg.id, cfg.color)}</svg>`;
        shape.onclick = (e) => {
            if (AC.state === 'suspended') AC.resume();
            shape.classList.add('hit');
            playHappy();
            burstStars(e.clientX, e.clientY, 5);
            shapeCounts[cfg.id]++;
            addScore(50);
            const slot = document.getElementById(`target-${cfg.id}`);
            const shown = Math.min(10, shapeCounts[cfg.id]);
            slot.querySelector('.count-text').innerText = `${shown}/10`;
            if (shapeCounts[cfg.id] >= 10) {
                slot.style.opacity = '1';
                slot.classList.add('complete');
            }
            if (Object.values(shapeCounts).every(v => v >= 10)) winGame();
            setTimeout(() => shape.remove(), 400);
        };
        container.appendChild(shape);

        let y = -90;
        const spd = 1.8 + Math.random() * 1.5;
        const anim = setInterval(() => {
            if (!state.active) { clearInterval(anim); return; }
            y += spd; shape.style.top = y + 'px';
            if (y > window.innerHeight + 50) { shape.remove(); clearInterval(anim); }
        }, 16);
    }, 900);
}

function getShapePath(type, color) {
    if (type === 'circle')   return `<circle cx="50" cy="50" r="42" fill="${color}"/><circle cx="36" cy="36" r="8" fill="rgba(255,255,255,.35)"/>`;
    if (type === 'square')   return `<rect x="12" y="12" width="76" height="76" rx="12" fill="${color}"/><rect x="20" y="20" width="28" height="14" rx="6" fill="rgba(255,255,255,.3)"/>`;
    if (type === 'triangle') return `<polygon points="50,8 94,90 6,90" fill="${color}"/><ellipse cx="50" cy="38" rx="12" ry="7" fill="rgba(255,255,255,.28)"/>`;
    return `<polygon points="50,4 61,35 95,35 67,56 78,87 50,70 22,87 33,56 5,35 39,35" fill="${color}"/><polygon points="50,14 57,36 72,36 61,48 65,70 50,60 35,70 39,48 28,36 43,36" fill="rgba(255,255,255,.2)"/>`;
}

/* ══════════════════════════════════════════════
   JUEGO: LABERINTO
══════════════════════════════════════════════ */
function initMaze() {
    const container = document.getElementById('maze-container');
    container.style.display = 'block';
    document.getElementById('maze-controls').style.display = 'flex';
    document.getElementById('current-mode-label').innerText = '🌀 LABERINTO';
    const board = document.getElementById('maze-board'); board.innerHTML = '';
    maze.size = 13;
    maze.cellSize = container.clientWidth / maze.size;
    maze.grid = Array(maze.size).fill(null).map(() => Array(maze.size).fill(0));

    function carve(x, y) {
        maze.grid[y][x] = 1;
        const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-.5);
        for (let [dx,dy] of dirs) {
            let nx = x+dx, ny = y+dy;
            if (nx>0&&nx<maze.size-1&&ny>0&&ny<maze.size-1&&maze.grid[ny][nx]===0) {
                maze.grid[y+dy/2][x+dx/2] = 1; carve(nx, ny);
            }
        }
    }
    carve(1,1);
    maze.grid[maze.size-2][maze.size-2] = 1;

    for (let y=0;y<maze.size;y++) {
        for (let x=0;x<maze.size;x++) {
            const el = document.createElement('div');
            el.style.cssText = `position:absolute;width:${maze.cellSize}px;height:${maze.cellSize}px;left:${x*maze.cellSize}px;top:${y*maze.cellSize}px;`;
            if (maze.grid[y][x] === 0) {
                el.className = 'maze-wall';
            } else {
                el.className = 'maze-path';
            }
            board.appendChild(el);
        }
    }
    maze.player = {x:1, y:1};
    maze.goal   = {x:maze.size-2, y:maze.size-2};
    const g = document.getElementById('maze-goal');
    g.style.width = g.style.height = maze.cellSize + 'px';
    g.style.left  = (maze.goal.x * maze.cellSize) + 'px';
    g.style.top   = (maze.goal.y * maze.cellSize) + 'px';
    g.style.fontSize = (maze.cellSize * .7) + 'px';
    updateMaze();
}

function moveMaze(dir) {
    if (AC.state === 'suspended') AC.resume();
    let nx = maze.player.x, ny = maze.player.y;
    if (dir==='up')    ny--;
    if (dir==='down')  ny++;
    if (dir==='left')  nx--;
    if (dir==='right') nx++;
    if (nx>=0&&nx<maze.size&&ny>=0&&ny<maze.size&&maze.grid[ny][nx]===1) {
        playTone(440+nx*15, .07, 'sine', .18);
        maze.player.x = nx; maze.player.y = ny; updateMaze();
        if (nx===maze.goal.x&&ny===maze.goal.y) {
            addScore(2000);
            const p = document.getElementById('maze-player');
            const rect = p.getBoundingClientRect();
            burstStars(rect.left, rect.top, 10);
            setTimeout(winGame, 500);
        }
    }
}

function updateMaze() {
    const p = document.getElementById('maze-player');
    const cs = maze.cellSize;
    p.style.width  = cs + 'px';
    p.style.height = cs + 'px';
    p.style.fontSize = (cs * .72) + 'px';
    p.style.left   = (maze.player.x * cs) + 'px';
    p.style.top    = (maze.player.y * cs) + 'px';
}

/* ══════════════════════════════════════════════
   TIMER GLOBAL
══════════════════════════════════════════════ */
function startGlobalTimer() {
    if (timerInt) clearInterval(timerInt);
    timerInt = setInterval(() => {
        state.timeLeft--;
        const m = Math.floor(state.timeLeft/60);
        const s = state.timeLeft % 60;
        const tag = document.getElementById('timer-tag');
        tag.innerText = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
        if (state.timeLeft <= 15) tag.classList.add('urgent');
        if (state.timeLeft <= 0) winGame();
    }, 1000);
}

/* ══════════════════════════════════════════════
   WIN
══════════════════════════════════════════════ */
function winGame() {
    if (!state.active) return;
    state.active = false;
    clearInterval(timerInt); clearInterval(spawnInt);
    const stars = state.score >= 1500 ? '⭐⭐⭐' : state.score >= 700 ? '⭐⭐' : '⭐';
    document.getElementById('win-emoji').innerText = state.score >= 1500 ? '🏆' : state.score >= 700 ? '🎖️' : '🎉';
    document.getElementById('win-stars').innerText = stars;
    document.getElementById('win-score').innerText = `${state.score} puntos`;
    document.getElementById('win-overlay').style.display = 'flex';
    playTriumph();
}

/* ══════════════════════════════════════════════
   TECLADO (accesibilidad)
══════════════════════════════════════════════ */
window.addEventListener('keydown', e => {
    if (state.mode==='maze') moveMaze(e.key.replace('Arrow','').toLowerCase());
});

/* Resume AudioContext on first touch */
document.addEventListener('touchstart', () => {
    if (AC.state === 'suspended') AC.resume();
}, {once: true});
</script>
